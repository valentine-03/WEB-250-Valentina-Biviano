<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Assignment - Wildfire Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Wildfire Record Management</h1>
        <p>Assignment 12: Insert, Update, and Delete Records via REST API</p>
    </header>

    <main>
        <section id="form-container">
            <h2 id="form-title">Add New Record</h2>
            <form id="record-form">
                <input type="hidden" id="record-id">
                
                <label for="location">Location (Text):</label>
                <input type="text" id="location" required placeholder="e.g. California">

                <label for="acres">Acres Burned (Number):</label>
                <input type="number" id="acres" required placeholder="e.g. 500">

                <label for="date">Date Reported (Date):</label>
                <input type="date" id="date" required>

                <div class="button-group">
                    <button type="submit" id="submit-btn">Save Record</button>
                    <button type="button" id="cancel-btn" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section id="display-container">
            <h2>Current Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>Location</th>
                        <th>Acres</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="records-table-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
