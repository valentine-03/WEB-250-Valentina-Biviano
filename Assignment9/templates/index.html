<!DOCTYPE html>
<html>
<head>
    <title>Pizza App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4"> Pizza Ordering System </h1>

<!-- Add Customer -->
<div class="card p-3 mb-4">
    <h3>Add Customer</h3>
    <form action="/add_customer" method="POST">
        <input class="form-control mb-2" type="text" name="name" placeholder="Name" required>
        <input class="form-control mb-2" type="text" name="email" placeholder="Email" required>
        <button class="btn btn-success">Add Customer</button>
    </form>
</div>

<!-- Place Order -->
<div class="card p-3 mb-4">
    <h3>Place Order</h3>
    <form action="/add_order" method="POST">

        <!-- Dropdown for customers -->
        <select class="form-control mb-2" name="customer_id" required>
            <option value="">Select Customer</option>
            {% for customer in customers %}
                <option value="{{ customer.id }}">
                    {{ customer.name }} (ID: {{ customer.id }})
                </option>
            {% endfor %}
        </select>

        <input class="form-control mb-2" type="text" name="pizza_name" placeholder="Pizza Name" required>
        <input class="form-control mb-2" type="number" name="quantity" placeholder="Quantity" required>

        <button class="btn btn-primary">Order</button>
    </form>
</div>

<!-- View Orders Button -->
<a href="/orders" class="btn btn-dark">View All Orders</a>

</body>
</html>
